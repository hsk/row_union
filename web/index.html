<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Row Union Playground</title>
    <style>
        :root {
            --bg-main: #1a1b26;
            --bg-sidebar: #16161e;
            --bg-input: #1f2335;
            --bg-output: #16161e;
            --bg-error: #2d1927;
            --accent: #7aa2f7;
            --accent-glow: rgba(122, 162, 247, 0.3);
            --text-main: #a9b1d6;
            --text-bright: #c0caf5;
            --text-muted: #565f89;
            --success: #9ece6a;
            --error: #f7768e;
            --border: #24283b;
            --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            letter-spacing: -0.01em;
        }

        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 32px;
            box-sizing: border-box;
            height: 100%;
        }

        .left-panel {
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            box-shadow: 4px 0 24px rgba(0, 0, 0, 0.15);
            z-index: 10;
        }

        .right-panel {
            background-color: var(--bg-main);
            overflow-y: auto;
            gap: 16px;
        }

        .title-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            width: 100%;
        }

        .main-title {
            margin: 0;
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(90deg, #7aa2f7, #bb9af3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.03em;
        }

        .github-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background-color: var(--bg-main);
            transition: all 0.2s ease;
        }

        .github-link:hover {
            color: var(--text-bright);
            border-color: var(--accent);
            box-shadow: 0 0 12px var(--accent-glow);
            transform: translateY(-1px);
        }

        .section-title {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            display: flex;
            align-items: center;
        }

        .section-title::before {
            content: '•';
            color: var(--accent);
            margin-right: 8px;
            font-size: 1.2rem;
        }

        .error-title::before {
            color: var(--error);
        }

        .code-input {
            flex: 1;
            width: 100%;
            background-color: var(--bg-input);
            color: var(--text-bright);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            font-family: var(--font-mono);
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            outline: none;
            box-sizing: border-box;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.2);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .code-input:focus {
            border-color: var(--accent);
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.2), 0 0 0 3px var(--accent-glow);
        }

        .run-button {
            margin-top: 20px;
            padding: 14px 28px;
            background: linear-gradient(135deg, #7aa2f7, #565f89);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.05em;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(122, 162, 247, 0.2);
            transition: all 0.2s ease;
        }

        .run-button:hover {
            background: linear-gradient(135deg, #89b0ff, #6571a0);
            box-shadow: 0 6px 20px rgba(122, 162, 247, 0.4);
            transform: translateY(-1px);
        }

        .run-button:active {
            transform: translateY(1px);
            box-shadow: 0 2px 6px rgba(122, 162, 247, 0.2);
        }

        .output-box, .error-box {
            margin: 0;
            padding: 20px;
            border-radius: 12px;
            font-family: var(--font-mono);
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
            box-sizing: border-box;
            border: 1px solid var(--border);
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }

        .output-box {
            background-color: var(--bg-output);
            color: var(--success);
            flex: 1.5; /* 出力画面を広めに */
            min-height: 200px;
        }

        .error-box {
            background-color: var(--bg-error);
            color: var(--error);
            border-color: rgba(247, 118, 142, 0.2);
            flex: 1;
            min-height: 120px;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-main);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>
</head>
<body>
    <script defer src="app.js"></script>
</body>
</html>
